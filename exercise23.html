<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Exercise 23</title>

<style>

body{

    margin:0;

    padding:30px;

    background:#f5f5f5;

    font-family:Arial, sans-serif;

}

.wrapper{

    width:900px;

    margin:auto;

    background:white;

    padding:20px;

    box-sizing:border-box;

}

.container{

    display:flex;

    gap:20px;

    align-items:flex-start;

}

.left-panel{

    width:180px;

}

.title{

    font-size:16px;

    font-weight:bold;

    color:#555;

    margin-bottom:15px;

}

.item{

    background:#8be28b;

    padding:12px;

    margin-bottom:10px;

    border:1px solid #5ea95e;

    font-size:13px;

}

.image-area{

    width:620px;

    background:#fff2df;

    border:1px solid #ddd;

    padding:20px;

    box-sizing:border-box;

    position:relative;

}

.image-area img{

    width:560px;

    height:280px;

    display:block;

    object-fit:cover;

}

button{

    position:absolute;

    top:15px;

    right:20px;

    width:90px;

    height:30px;

    border-radius:10px;

    border:1px solid #222;

    background:white;

    font-size:14px;

    cursor:pointer;

}

.info{

    display:none;

    width:560px;

    height:130px;

    margin-top:15px;

    padding:10px;

    box-sizing:border-box;

    border:1px solid #bbb;

    background:#f8f8f8;

    font-size:13px;

    color:#666;

    line-height:1.7;

    overflow-y:scroll;

}

</style>

</head>

<body>

<div class="wrapper">

<div class="container">

<div class="left-panel">

<div class="title">Preview</div>

<div class="item">Image 1</div>

<div class="item">Image 2</div>

<div class="item">Image 3</div>

</div>

<div class="image-area">

<button onclick="toggleInfo()">Details</button>

<img src="https://picsum.photos/id/1015/560/280" alt="Image">

<div id="info" class="info">

<strong>Image Information</strong><br>

Name: River Landscape<br>

Size: 560 x 280<br>

Category: Nature<br>

Format: JPG<br>

Description: Beautiful river and mountain view.<br>

Upload Date: 2026/04/27<br>

Author: User<br>

Status: Active<br>

Resolution: HD<br>

Extra Data Line 1<br>

Extra Data Line 2<br>

Extra Data Line 3<br>

</div>

</div>

</div>

</div>

<script>

function toggleInfo(){

var box=document.getElementById("info");

if(box.style.display=="block"){

box.style.display="none";

}else{

box.style.display="block";

}

}

</script>

</body>

</html>
