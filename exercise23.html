<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Preview UI</title>

<style>
body {
    font-family: Roboto, sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px;
    background-color: #f5f5f5;
}

/* 外框 */
.container {
    width: 520px;
    background: #fff;
    border: 1px solid #ddd;
}

/* ⭐ 上方 header（重點） */
.header {
    height: 35px;
    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 10px;
    border-bottom: 1px solid #ddd;
}

/* 左側文字 */
.title {
    font-size: 13px;
    color: #2f2f2f;
}

/* 按鈕 */
.btn {
    height: 22px;
    padding: 0 10px;
    border-radius: 8px;
    border: 1px solid #2f2f2f;
    background-color: #ffffff;
    font-size: 13px;
    cursor: pointer;
}

.btn:hover {
    background-color: #f0f0f0;
}

/* 圖片 */
.image-box img {
    width: 100%;
    display: block;
}

/* 詳細資訊 */
.details {
    display: none;
    font-size: 13px;
    color: #707070;
    border-top: 1px solid #ccc;
    padding: 10px;

    max-height: 120px;
    overflow-y: scroll; /* 強制 scrollbar */
}

/* scrollbar（確保看得到） */
.details::-webkit-scrollbar {
    width: 8px;
}

.details::-webkit-scrollbar-thumb {
    background-color: #999;
    border-radius: 4px;
}
</style>
</head>

<body>

<div class="container">

    <!-- ⭐ 上方長框 -->
    <div class="header">
        <div class="title">預覽</div>

        <button class="btn" onclick="toggleDetails()">
            查看資訊
        </button>
    </div>

    <!-- 圖片 -->
    <div class="image-box">
        <img src="https://picsum.photos/500/300">
    </div>

    <!-- 詳細資訊 -->
    <div id="details" class="details">
        <p>日期：2017/10/12</p>
        <p>檔名：20171012_1.jpg</p>
        <p>大小：400.57KB</p>
        <p>路徑：/user/project/images/sample.jpg</p>
        <p>作者：admin</p>
        <p>描述：這是一張測試圖片</p>
        <p>更多資訊1</p>
        <p>更多資訊2</p>
        <p>更多資訊3</p>
        <p>更多資訊4</p>
        <p>更多資訊5</p>
    </div>

</div>

<script>
function toggleDetails() {
    const d = document.getElementById("details");
    d.style.display = (d.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
