<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Exercise 23</title>

<style>

body{

    margin:0;

    padding:30px;

    background:#f5f5f5;

    font-family:Roboto, Arial, sans-serif;

}

.wrapper{

    width:760px;

    margin:auto;

    background:white;

    padding:20px;

    box-sizing:border-box;

}

.container{

    display:flex;

    gap:20px;

    align-items:flex-start;

}

.list{

    width:180px;

}

.item{

    background:#90ee90;

    margin-bottom:8px;

    padding:8px;

    font-size:13px;

    cursor:pointer;

    border:1px solid #5fa85f;

}

.item:hover{

    background:#7ed97e;

}

.image-area{

    width:496px;

    background:#fff2df;

    border:1px solid #ddd;

    padding:20px;

    box-sizing:border-box;

    position:relative;

}

.image-area img{

    width:450px;

    height:240px;

    display:block;

    object-fit:cover;

}

button{

    position:absolute;

    top:8px;

    right:12px;

    width:82px;

    height:22px;

    border-radius:8px;

    border:1px solid #212f2f;

    background:white;

    color:#212f2f;

    font-size:13px;

    cursor:pointer;

}

button:hover{

    background:#eeeeee;

}

.info{

    display:none;

    width:450px;

    height:100px;

    overflow-y:auto;

    margin-top:12px;

    padding:10px;

    box-sizing:border-box;

    border:1px solid #cccccc;

    background:white;

    font-size:13px;

    color:#707070;

    line-height:1.7;

}

</style>

</head>

<body>

<div class="wrapper">

    <div class="container">

        <div class="list">

            <div class="item" onclick="changeImage('https://picsum.photos/id/1015/450/240','River Landscape','450 x 240','Nature','JPG','A beautiful river landscape with mountains and clear water.')">

                Image 1

            </div>

            <div class="item" onclick="changeImage('https://picsum.photos/id/1016/450/240','Mountain View','450 x 240','Travel','JPG','A mountain view with natural scenery and bright sky.')">

                Image 2

            </div>

            <div class="item" onclick="changeImage('https://picsum.photos/id/1018/450/240','Forest Path','450 x 240','Outdoor','JPG','A peaceful forest path surrounded by green trees.')">

                Image 3

            </div>

            <div class="item" onclick="changeImage('https://picsum.photos/id/1020/450/240','Bear Image','450 x 240','Animal','JPG','A wildlife image showing a bear in nature.')">

                Image 4

            </div>

        </div>

        <div class="image-area">

            <button onclick="toggleInfo()">Details</button>

            <img id="mainImg" src="https://picsum.photos/id/1015/450/240" alt="Image">

            <div id="info" class="info">

                <strong>Image Information</strong><br>

                Name: River Landscape<br>

                Size: 450 x 240<br>

                Category: Nature<br>

                Format: JPG<br>

                Description: A beautiful river landscape with mountains and clear water.

            </div>

        </div>

    </div>

</div>

<script>

function toggleInfo(){

    var info = document.getElementById("info");

    if(info.style.display === "block"){

        info.style.display = "none";

    }else{

        info.style.display = "block";

    }

}

function changeImage(url, name, size, category, format, description){

    document.getElementById("mainImg").src = url;

    document.getElementById("info").innerHTML =

        "<strong>Image Information</strong><br>" +

        "Name: " + name + "<br>" +

        "Size: " + size + "<br>" +

        "Category: " + category + "<br>" +

        "Format: " + format + "<br>" +

        "Description: " + description + "<br><br>" +

        "This area can be scrolled when the information is longer.";

}

</script>

</body>

</html>
