<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Specified Button</title>

<style>

body{

    margin:0;

    font-family:Roboto, Arial, sans-serif;

    background:#f6f6f6;

    color:#2f2f2f;

}

.container{

    width:760px;

    margin:30px auto;

    background:white;

    padding:20px;

    box-sizing:border-box;

}

.title{

    font-size:13px;

    color:#707070;

    margin-bottom:8px;

}

.main-area{

    display:flex;

    gap:20px;

}

.image-box{

    width:496px;

    border:1px solid #ddd;

    background:#fff2df;

    padding:20px;

    box-sizing:border-box;

    position:relative;

}

.image-box img{

    width:450px;

    height:240px;

    display:block;

    object-fit:cover;

}

.btn{

    position:absolute;

    top:-12px;

    right:20px;

    width:82px;

    height:22px;

    border-radius:8px;

    border:1px solid #212f2f;

    background:#ffffff;

    color:#212f2f;

    font-size:13px;

    font-family:Roboto, Arial, sans-serif;

    cursor:pointer;

}

.btn:hover{

    background:#eeeeee;

}

.info{

    margin-top:20px;

    padding:15px;

    border-top:1px solid #dddddd;

    font-size:13px;

    color:#707070;

    display:none;

    line-height:1.8;

}

.info.active{

    display:block;

}

.side{

    width:180px;

    font-size:13px;

    color:#707070;

}

.side-title{

    color:#ff9999;

    margin-bottom:20px;

}

</style>

</head>

<body>

<div class="container">

    <div class="title">摘要</div>

    <div class="main-area">

        <div class="image-box">

            <button class="btn" onclick="showInfo()">查看資訊</button>

            <img src="20171012-1.jpg" alt="landscape image">

        </div>

        <div class="side">

            <div class="side-title">詳細圖片資訊</div>

            <p>請點擊圖片右上方的按鈕。</p>

        </div>

    </div>

    <div id="info" class="info">

        <strong>Image Information</strong><br>

        File name: 20171012-1.jpg<br>

        Image size: 450 × 240<br>

        Button size: height 22px, radius 8px<br>

        Font: Roboto Regular 13px<br>

        Color: #212f2f

    </div>

</div>

<script>

function showInfo(){

    document.getElementById("info").classList.toggle("active");

}

</script>

</body>

</html>
