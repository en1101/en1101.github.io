<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello World Style</title>

<style>
body {
    background-color: #eee;
    font-family: Arial, sans-serif;
}

.box1 {
    background-color: #b7d3d9;
    border: 5px double red;
    padding: 10px;
    margin: 20px;
    width: 300px;
    font-size: 30px;
    font-weight: bold;
}

.box2 {
    background-color: yellow;
    border: 3px solid #6a5acd;
    border-radius: 15px;
    padding: 10px;
    margin: 20px;
    width: 300px;
    font-size: 30px;
    font-weight: bold;
}

.box3 {
    position: relative;
    background-color: #2e8b57;
    color: #003300;
    padding: 10px;
    margin: 20px;
    width: 300px;
    font-size: 30px;
    font-weight: bold;
    box-sizing: border-box;
}

.box3 span {
    position: relative;
    z-index: 2;
}

.box3::before {
    content: "";
    position: absolute;
    top: 0;
    left: 6px;
    width: 288px;
    height: 12px;
    background: radial-gradient(circle, gray 0 3px, transparent 3.5px);
    background-size: 12.5217px 12px;
    background-repeat: repeat-x;
    background-position: left center;
}

.box3::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 6px;
    width: 288px;
    height: 12px;
    background: radial-gradient(circle, gray 0 3px, transparent 3.5px);
    background-size: 12.5217px 12px;
    background-repeat: repeat-x;
    background-position: left center;
}

.dot-left {
    position: absolute;
    top: 6px;
    left: 0;
    width: 12px;
    height: calc(100% - 12px);
    background: radial-gradient(circle, gray 0 3px, transparent 3.5px);
    background-size: 12px calc((100% - 12px) / 2);
    background-repeat: repeat-y;
    background-position: center top;
}

.dot-right {
    position: absolute;
    top: 6px;
    right: 0;
    width: 12px;
    height: calc(100% - 12px);
    background: radial-gradient(circle, gray 0 3px, transparent 3.5px);
    background-size: 12px calc((100% - 12px) / 2);
    background-repeat: repeat-y;
    background-position: center top;
}
</style>

</head>
<body>

<div class="box1">Hello World</div>
<div class="box2">Hello World</div>
<div class="box3">
    <div class="dot-left"></div>
    <div class="dot-right"></div>
    <span>Hello World</span>
</div>

</body>
</html>
