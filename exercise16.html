<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello World Style</title>
<style>
body {
    background-color: #f5f5f5;
    font-family: "Times New Roman", serif;
}

.container {
    width: 400px;
    margin: 50px auto;
}

.box1 {
    background-color: lightblue;
    border: 6px double red;
    padding: 10px;
    margin-bottom: 20px;
    font-size: 24px;
    font-weight: bold;
}

.box2 {
    background-color: yellow;
    border: 3px solid dodgerblue;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 20px;
    font-size: 24px;
    font-weight: bold;
}

.box3 {
    background-color: mediumseagreen;
    border: 6px dotted gray;
    padding: 10px;
    font-size: 24px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <div class="box1">Hello World</div>
    <div class="box2">Hello World</div>
    <div class="box3">Hello World</div>
</div>

</body>
</html>
