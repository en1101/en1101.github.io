<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello World Style</title>
<style>
body {
    background-color: #f5f5f5;
    font-family: "Times New Roman", serif;
}

.container {
    width: 420px;
    margin: 50px auto;
    background: white;
    padding: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
}

.box1 {
    background-color: lightblue;
    border: 6px double tomato;
    padding: 8px 12px;
    margin-bottom: 18px;
    font-size: 24px;
    font-weight: bold;
}

.box2 {
    background-color: yellow;
    border: 4px solid dodgerblue;
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 18px;
    font-size: 24px;
    font-weight: bold;
}

.box3 {
    background:
        radial-gradient(circle, gray 0 6px, transparent 7px) top left / 37px 20px repeat-x,
        radial-gradient(circle, gray 0 6px, transparent 7px) bottom left / 37px 20px repeat-x,
        mediumseagreen;
    padding: 18px 12px;
    font-size: 24px;
    font-weight: bold;
}
</style>
</head>
<body>
<div class="container">
    <div class="box1">Hello World</div>
    <div class="box2">Hello World</div>
    <div class="box3">Hello World</div>
</div>
</body>
</html>
