<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello World Style</title>
<style>
body{
    background:#e9e9e9;
    font-family:"Times New Roman", serif;
}

.container{
    width:420px;
    margin:50px auto;
    background:#fff;
    padding:18px;
    box-shadow:0 4px 18px rgba(0,0,0,0.25);
}

.box1{
    background:lightblue;
    border:8px double tomato;
    padding:10px 14px;
    margin-bottom:22px;
    font-size:24px;
    font-weight:bold;
}

.box2{
    background:yellow;
    border:4px solid dodgerblue;
    border-radius:12px;
    padding:10px 14px;
    margin-bottom:22px;
    font-size:24px;
    font-weight:bold;
}

.box3{
    background:
        radial-gradient(circle, gray 0 4px, transparent 5px) top left/24px 12px repeat-x,
        radial-gradient(circle, gray 0 4px, transparent 5px) bottom left/24px 12px repeat-x,
        radial-gradient(circle, gray 0 4px, transparent 5px) left top/12px 24px repeat-y,
        radial-gradient(circle, gray 0 4px, transparent 5px) right top/12px 24px repeat-y,
        mediumseagreen;
    padding:16px 16px;
    font-size:24px;
    font-weight:bold;
}
</style>
</head>
<body>
<div class="container">
    <div class="box1">Hello World</div>
    <div class="box2">Hello World</div>
    <div class="box3">Hello World</div>
</div>
</body>
</html>
