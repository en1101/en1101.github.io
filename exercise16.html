<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello World Style</title>
<style>
body{
    background:#e9e9e9;
    font-family:"Times New Roman", serif;
}

.container{
    width:420px;
    margin:50px auto;
    background:#fff;
    padding:18px;
    box-shadow:0 4px 18px rgba(0,0,0,0.25);
}

.box1{
    background:lightblue;
    border:8px double tomato;
    padding:10px 14px;
    margin-bottom:22px;
    font-size:24px;
    font-weight:bold;
}

.box2{
    background:yellow;
    border:4px solid dodgerblue;
    border-radius:12px;
    padding:10px 14px;
    margin-bottom:22px;
    font-size:24px;
    font-weight:bold;
}

.box3{
    position:relative;
    background:mediumseagreen;
    padding:18px 16px;
    font-size:24px;
    font-weight:bold;
    margin-top:4px;
}

.box3::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
        radial-gradient(circle, gray 0 4px, transparent 4.5px),
        radial-gradient(circle, gray 0 4px, transparent 4.5px),
        radial-gradient(circle, gray 0 4px, transparent 4.5px),
        radial-gradient(circle, gray 0 4px, transparent 4.5px);
    background-repeat:repeat-x, repeat-x, repeat-y, repeat-y;
    background-size:31px 12px, 31px 12px, 12px 24px, 12px 24px;
    background-position:top center, bottom center, left center, right center;
}
</style>
</head>
<body>
<div class="container">
    <div class="box1">Hello World</div>
    <div class="box2">Hello World</div>
    <div class="box3">Hello World</div>
</div>
</body>
</html>
