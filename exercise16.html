<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello World Style</title>
<style>
body {
    background-color: #f5f5f5;
    font-family: "Times New Roman", serif;
}

.container {
    width: 400px;
    margin: 50px auto;
}

.box1 {
    background-color: lightblue;
    border: 6px double red;
    padding: 10px;
    margin-bottom: 20px;
    font-size: 24px;
    font-weight: bold;
}

.box2 {
    background-color: yellow;
    border: 3px solid dodgerblue;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 20px;
    font-size: 24px;
    font-weight: bold;
}

.box3 {
    position: relative;
    background-color: mediumseagreen;
    padding: 20px 10px;
    font-size: 24px;
    font-weight: bold;
    margin-top: 10px;
}

.box3::before {
    content: "";
    position: absolute;
    top: -10px;
    left: 0;
    right: 0;
    height: 20px;
    background-image: radial-gradient(circle, gray 40%, transparent 41%);
    background-size: 30px 20px;
}

.box3::after {
    content: "";
    position: absolute;
    bottom: -10px;
    left: 0;
    right: 0;
    height: 20px;
    background-image: radial-gradient(circle, gray 40%, transparent 41%);
    background-size: 30px 20px;
}
</style>
</head>

<body>

<div class="container">
    <div class="box1">Hello World</div>
    <div class="box2">Hello World</div>
    <div class="box3">Hello World</div>
</div>

</body>
</html>
