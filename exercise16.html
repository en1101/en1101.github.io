<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello World Style</title>

<style>
body {
    background-color: #eee;
    font-family: Arial, sans-serif;
}

.box1,
.box2,
.box3 {
    width: 300px;
    padding: 10px;
    margin: 20px;
    font-size: 30px;
    font-weight: bold;
    box-sizing: border-box;
}

.box1 {
    background-color: #b7d3d9;
    border: 5px double red;
}

.box2 {
    background-color: yellow;
    border: 3px solid #6a5acd;
    border-radius: 15px;
}

.box3 {
    background:
        radial-gradient(circle at 3px 3px, gray 0 3px, transparent 3.2px) top left / calc((100% - 12px) / 22) 6px repeat-x border-box,
        radial-gradient(circle at 3px 3px, gray 0 3px, transparent 3.2px) bottom left / calc((100% - 12px) / 22) 6px repeat-x border-box,
        radial-gradient(circle at 3px 3px, gray 0 3px, transparent 3.2px) top left / 6px calc((100% - 12px) / 2) repeat-y border-box,
        radial-gradient(circle at 3px 3px, gray 0 3px, transparent 3.2px) top right / 6px calc((100% - 12px) / 2) repeat-y border-box,
        #2e8b57;
    border: 6px solid transparent;
    color: #003300;
}
</style>

</head>
<body>

<div class="box1">Hello World</div>
<div class="box2">Hello World</div>
<div class="box3">Hello World</div>

</body>
</html>
