<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Exercise 24</title>

<style>

body{

    margin:0;

    padding:40px;

    background:#eeeeee;

}

.container{

    width:780px;

    height:320px;

    margin:auto;

    position:relative;

}

/* 左圖 */

.left-img{

    position:absolute;

    left:0;

    top:0;

    width:300px;

    height:300px;

    object-fit:fill;

    border-radius:18px;

}

/* 中間圓圖 */

.circle-img{

    position:absolute;

    left:315px;

    top:0;

    width:150px;

    height:150px;

    object-fit:fill;

    border-radius:50%;

    border:3px solid #444;

}

/* 右圖 */

.right-img{

    position:absolute;

    left:480px;

    top:0;

    width:300px;

    height:300px;

    object-fit:fill;

}

</style>

</head>

<body>

<div class="container">

<img class="left-img"

src="https://picsum.photos/id/1040/400/300">

<img class="circle-img"

src="https://picsum.photos/id/1015/300/300">

<img class="right-img"

src="https://picsum.photos/id/1040/400/300">

</div>

</body>

</html>
