<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Exercise 24</title>

<style>

body{

    margin:0;

    padding:40px;

    background:#f5f5f5;

    text-align:center;

}

.container{

    width:900px;

    margin:auto;

    position:relative;

}

.left-img,

.right-img{

    width:33%;

    height:300px;

    object-fit:cover;

    border-radius:18px;

    vertical-align:top;

}

.left-img{

    float:left;

}

.right-img{

    float:right;

}

.circle-img{

    width:150px;

    height:150px;

    object-fit:cover;

    border-radius:50%;

    border:3px solid #444;

    position:absolute;

    top:0;

    left:50%;

    transform:translateX(-50%);

}

.clear{

    clear:both;

}

</style>

</head>

<body>

<div class="container">

<img class="left-img"

src="https://picsum.photos/id/1040/300/300">

<img class="circle-img"

src="https://picsum.photos/id/1015/300/300">

<img class="right-img"

src="https://picsum.photos/id/1040/300/300">

<div class="clear"></div>

</div>

</body>

</html>
