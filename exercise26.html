<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Exercise 26</title>

<style>

body{

    margin:0;

    padding:40px;

    background:#eeeeee;

}

.container{

    width:980px;

    height:320px;

    margin:auto;

    position:relative;

}

/* 左圖：比例跟題目一樣（較窄較高） */

.left-img{

    position:absolute;

    left:0;

    top:0;

    width:320px;

    height:300px;

    object-fit:cover;

    border-radius:18px;

}

/* 中間圓圖 */

.circle-img{

    position:absolute;

    left:345px;

    top:0;

    width:150px;

    height:150px;

    object-fit:cover;

    border-radius:50%;

    border:3px solid #444;

}

/* 右圖：比例同左圖 */

.right-img{

    position:absolute;

    left:520px;

    top:0;

    width:320px;

    height:300px;

    object-fit:cover;

}

</style>

</head>

<body>

<div class="container">

<img class="left-img"

src="https://picsum.photos/id/1040/500/600">

<img class="circle-img"

src="https://picsum.photos/id/1015/300/300">

<img class="right-img"

src="https://picsum.photos/id/1040/500/600">

</div>

</body>

</html>
