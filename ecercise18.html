<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heading Practice</title>

<style>
body {
    background-color: #f2f2f2;
    font-family: "Times New Roman", serif;
}

/* 外框 */
.container {
    width: 500px;
    background-color: #ddd;
    padding: 20px;
    margin: 50px auto;
    box-shadow: 2px 2px 5px gray;
}

/* Heading 1 */
.h1 {
    font-size: 28px;
    font-weight: bold;
    text-decoration: underline;
    border-top: 3px solid black;
    display: inline-block;
    padding-top: 5px;
}

/* Heading 2 外框 */
.h2-box {
    border: 3px solid #c9b800; /* 黃色框 */
    padding: 5px;
    margin-top: 15px;
}

/* Heading 2 文字 */
.h2 {
    font-size: 20px;
    font-style: italic;
}

/* Heading 3 */
.h3 {
    font-size: 18px;
    text-decoration: underline;
    text-align: right;
    margin-top: 15px;
}
</style>

</head>

<body>

<div class="container">
    <div class="h1">This is heading 1</div>

    <div class="h2-box">
        <div class="h2">This is heading 2</div>
    </div>

    <div class="h3">This is heading 3</div>
</div>

</body>
</html>
