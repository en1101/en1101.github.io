<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsive Layout</title>

<style>

body{

    margin:0;

    padding:30px;

    background:#f5f5f5;

}

.container{

    background:#4db3f2;

    padding:20px;

    box-sizing:border-box;

    width:100%;

    max-width:760px;

    margin:auto;

}

.card{

    background:white;

    border-radius:8px;

    padding:10px;

    box-sizing:border-box;

}

.header{

    height:80px;

    background:#a8d83f;

    margin-bottom:8px;

}

.content{

    display:grid;

    grid-template-columns:1fr;

    gap:8px;

    margin-bottom:8px;

}

.content div{

    height:45px;

    background:#10bcc7;

}

.footer{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:8px;

}

.footer div{

    height:35px;

    background:#dfe8eb;

}

@media screen and (min-width:480px){

    .content{

        grid-template-columns:1fr 1fr 1fr;

    }

    .content div{

        height:95px;

    }

    .footer{

        grid-template-columns:1fr 1fr 1fr 1fr;

    }

}

</style>

</head>

<body>

<div class="container">

    <div class="card">

        <div class="header"></div>

        <div class="content">

            <div></div>

            <div></div>

            <div></div>

        </div>

        <div class="footer">

            <div></div>

            <div></div>

            <div></div>

            <div></div>

        </div>

    </div>

</div>

</body>

</html>
