<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heading Style</title>

<style>
body {
    background-color: #f2f2f2;
    font-family: "Times New Roman", serif;
}

.container {
    width: 520px;
    background-color: #ddd;
    padding: 20px;
    margin: 50px auto;
    box-shadow: 5px 5px 10px gray;
}

.h1 {
    font-size: 30px;
    font-weight: bold;
    border-top: 4px solid black;
    display: inline-block;
    padding-top: 5px;
    text-shadow: 2px 2px 0 pink;
}

.h2-box {
    border: 3px solid #c9b800;
    padding: 5px;
    margin-top: 15px;
}

.h2 {
    font-size: 22px;
    font-style: italic;
}

.h3 {
    font-size: 18px;
    text-align: right;
    text-decoration: underline;
    margin-top: 15px;
}
</style>

</head>

<body>

<div class="container">
    <div class="h1">This is heading 1</div>

    <div class="h2-box">
        <div class="h2">This is heading 2</div>
    </div>

    <div class="h3">This is heading 3</div>
</div>

</body>
</html>
