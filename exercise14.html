<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Circle and Rectangle</title>

<style>

.rectangle{
    width:200px;
    height:200px;
    background-color:blue;
    border:4px solid black;
    position:absolute;
    left:100px;
    top:100px;
}

.circle{
    width:200px;
    height:200px;
    background-color:yellow;
    border:6px solid red;
    border-radius:50%;
    position:absolute;
    left:220px;
    top:120px;
}

</style>

</head>

<body>

<div class="rectangle"></div>
<div class="circle"></div>

</body>
</html>
