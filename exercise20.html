<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Exercise20</title>
    <style>
        table {
            border-collapse: collapse;
            width: 200px;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: gray;
            color: white;
        }
        .yellow {
            background-color: yellow;
        }

        .fixed-box {
            position: fixed;
            top: 20px;
            right: 20px;
            border: 3px solid green;
            padding: 10px;
            width: 150px;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <th>Firstname</th>
        <th>Lastname</th>
    </tr>
    <tr class="yellow">
        <td>1</td>
        <td>1</td>
    </tr>
    <tr>
        <td>2</td>
        <td>2</td>
    </tr>
    <tr class="yellow">
        <td>3</td>
        <td>3</td>
    </tr>
</table>

<div class="fixed-box">
    This div element has position: fixed;
</div>

</body>
</html>
