<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Exercise 19</title>

<style>

body{

    margin:0;

    background:#eee;

    font-family:Arial;

}

.container{

    width:700px;

    margin:80px auto;

    background:white;

    padding:30px;

    box-shadow:0 0 8px gray;

    position:relative;

}

table{

    border-collapse:collapse;

}

th,td{

    border:1px solid black;

    width:120px;

    height:50px;

    text-align:left;

    padding-left:15px;

    font-size:28px;

}

th{

    background:gray;

    color:white;

}

tr:nth-child(2),

tr:nth-child(4){

    background:yellow;

}

.fixedbox{

    position:fixed;

    top:220px;

    right:280px;

    width:180px;

    height:180px;

    border:5px solid green;

    padding:10px;

    font-size:24px;

}

</style>

</head>

<body>

<div class="container">

<table>

<tr>

<th>Firstname</th>

<th>Lastname</th>

</tr>

<tr>

<td>1</td>

<td>1</td>

</tr>

<tr>

<td>2</td>

<td>2</td>

</tr>

<tr>

<td>3</td>

<td>3</td>

</tr>

</table>

<div class="fixedbox">

This div<br>

element has<br>

position: fixed;

</div>

</div>

</body>

</html>
