<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Exercise 19</title>

<style>

body{

    background:#ececec;

    font-family:Arial;

}

.wrapper{

    width:900px;

    height:380px;

    margin:80px auto;

    background:#e5e5e5;

    position:relative;

    padding:25px;

}

.box{

    width:820px;

    height:250px;

    background:white;

    margin:auto;

    box-shadow:0 0 5px gray;

    position:relative;

}

table{

    border-collapse:collapse;

    position:absolute;

    left:15px;

    top:15px;

}

th,td{

    width:120px;

    height:55px;

    border:1px solid black;

    padding-left:12px;

    font-size:20px;

}

th{

    background:gray;

    color:white;

}

.yellow{

    background:yellow;

}

.fixedbox{

    position:fixed;

    top:210px;

    right:320px;

    width:130px;

    height:140px;

    border:4px solid green;

    padding:8px;

    font-size:18px;

    background:white;

}

.text1{

    position:absolute;

    left:20px;

    bottom:-95px;

    color:red;

    font-size:26px;

    font-style:italic;

}

.text2{

    position:absolute;

    right:10px;

    bottom:-95px;

    color:red;

    font-size:26px;

    font-style:italic;

}

</style>

</head>

<body>

<div class="wrapper">

<div class="box">

<table>

<tr>

<th>Firstname</th>

<th>Lastname</th>

</tr>

<tr class="yellow">

<td>1</td>

<td>1</td>

</tr>

<tr>

<td>2</td>

<td>2</td>

</tr>

<tr class="yellow">

<td>3</td>

<td>3</td>

</tr>

</table>

<div class="fixedbox">

This div<br>

element has<br>

position: fixed;

</div>

<div class="text1">

Table with different<br>

background colors

</div>

<div class="text2">

A div element fix at top<br>

and right

</div>

</div>

</div>

</body>

</html>
